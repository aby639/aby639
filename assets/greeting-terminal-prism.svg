<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated greeting terminal for Aby Daniel Varghese</title>
  <desc id="desc">A non-face cyber greeting card with terminal text, device motif and moving prism slashes.</desc>
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="slash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5f3fc" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="pinkSlash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#fda4af" stop-opacity="0.30"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.58"/>
    </filter>
    <style>
      .sans{font-family:Inter,Segoe UI,Arial,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace}
      .small{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
      .line{font-size:21px;font-weight:650}
      .dash{stroke-dasharray:7 13;animation:dash 7s linear infinite}
      .blink{animation:blink 1s steps(2,end) infinite}
      .float{animation:float 5s ease-in-out infinite}
      .floatTwo{animation:floatTwo 6s ease-in-out infinite}
      .glint{animation:glint 3.4s ease-in-out infinite}
      .bar{animation:bar 2.8s ease-in-out infinite}
      .bar2{animation:bar 3.4s ease-in-out infinite .4s}
      .bar3{animation:bar 2.5s ease-in-out infinite .8s}
      @keyframes dash{to{stroke-dashoffset:-180}}
      @keyframes blink{50%{opacity:0}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes floatTwo{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(9px) rotate(-2deg)}}
      @keyframes glint{0%{transform:translateX(-220px);opacity:0}35%{opacity:.9}65%,100%{transform:translateX(280px);opacity:0}}
      @keyframes bar{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}
    </style>
  </defs>

  <rect width="1200" height="360" rx="30" fill="#020617"/>
  <rect x="12" y="12" width="1176" height="336" rx="28" fill="#050b1d" stroke="url(#border)" stroke-width="3"/>
  <path d="M40 288C222 236 346 292 520 246S838 184 1162 256" fill="none" stroke="#1e293b" stroke-width="2"/>
  <path d="M74 74H1126M74 270H1126" stroke="#0f1d34" stroke-width="1"/>
  <path class="dash" d="M650 58V302M76 182H1122" fill="none" stroke="#334155" stroke-width="2"/>

  <g transform="translate(72 72)">
    <rect width="560" height="216" rx="24" fill="#030817" stroke="#1f2a44"/>
    <text class="mono small" fill="#22d3ee" x="34" y="48">HELLO VISITOR</text>
    <text class="sans" fill="#f8fafc" x="34" y="94" font-size="37" font-weight="900">Welcome to my build space</text>
    <text class="sans line" fill="#cbd5e1" x="34" y="134">I build polished web, mobile and API products.</text>
    <text class="sans line" fill="#94a3b8" x="34" y="172">Current focus: MemoLens, product polish and clean releases.</text>
    <text class="mono small" fill="#facc15" x="34" y="214">ABY DANIEL VARGHESE</text>
    <rect x="258" y="198" width="12" height="22" fill="#22d3ee" class="blink"/>
  </g>

  <g transform="translate(706 44)">
    <g class="floatTwo" filter="url(#shadow)">
      <rect x="104" y="38" width="164" height="226" rx="28" fill="#071426" stroke="#22d3ee" stroke-width="3"/>
      <rect x="126" y="72" width="120" height="16" rx="8" fill="#020617"/>
      <rect x="128" y="112" width="44" height="44" rx="12" fill="#0e7490" opacity=".75"/>
      <rect x="190" y="112" width="44" height="44" rx="12" fill="#fb7185" opacity=".72"/>
      <rect x="128" y="176" width="106" height="14" rx="7" fill="#334155"/>
      <rect x="128" y="204" width="80" height="14" rx="7" fill="#1e293b"/>
      <rect x="128" y="232" width="114" height="14" rx="7" fill="#0f172a"/>
    </g>

    <g class="float" filter="url(#glow)">
      <path d="M202 18h102L206 312H104z" fill="url(#slash)"/>
      <path d="M346 38h72L328 312h-72z" fill="url(#pinkSlash)"/>
      <path d="M80 70h52L24 312h-48z" fill="#e0f2fe" opacity=".46"/>
      <path d="M426 80h126L448 312H326z" fill="#475569" opacity=".30"/>
    </g>

    <g class="glint">
      <path d="M186 20h18L104 312H86z" fill="#ffffff" opacity=".85"/>
    </g>

    <g transform="translate(418 28)" class="float">
      <rect x="0" y="0" width="104" height="68" rx="18" fill="#111827" stroke="#fb7185" stroke-width="2"/>
      <circle cx="28" cy="34" r="9" fill="#fb7185"/>
      <path d="M38 46l28-28 30 28z" fill="#64748b"/>
    </g>

    <g transform="translate(26 260)">
      <rect x="0" y="0" width="440" height="40" rx="20" fill="#020617" stroke="#1f2937"/>
      <circle cx="28" cy="20" r="8" fill="#22d3ee"/>
      <text class="mono small" fill="#e0f2fe" x="54" y="25">PRODUCT ENERGY ONLINE</text>
      <rect class="bar" x="286" y="12" width="12" height="16" rx="4" fill="#22d3ee" style="transform-origin:292px 28px"/>
      <rect class="bar2" x="310" y="8" width="12" height="20" rx="4" fill="#fb7185" style="transform-origin:316px 28px"/>
      <rect class="bar3" x="334" y="14" width="12" height="14" rx="4" fill="#facc15" style="transform-origin:340px 28px"/>
    </g>
  </g>
</svg>
