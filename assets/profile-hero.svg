<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aby Daniel Varghese profile hero</title>
  <desc id="desc">A dark futuristic profile banner featuring MemoLens, full stack development and mobile app visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="185" y1="0" x2="975" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.45" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="phone" x1="746" y1="96" x2="1035" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="0.55" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(921 242) rotate(90) scale(260 310)">
      <stop stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#22d3ee" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(346 368) rotate(90) scale(220 310)">
      <stop stop-color="#a78bfa" stop-opacity="0.34"/>
      <stop offset="0.62" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="772" y="98" width="242" height="392" rx="42"/>
    </clipPath>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, &quot;Liberation Mono&quot;, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; }
      .grid { stroke: #38bdf8; stroke-opacity: .14; }
      .soft { fill: #cbd5e1; }
      .muted { fill: #94a3b8; }
      .accent { fill: #22d3ee; }
      @media (prefers-reduced-motion: no-preference) {
        #ringA { animation: pulse 3.2s ease-in-out infinite; transform-origin: 900px 285px; }
        #ringB { animation: pulse 3.2s ease-in-out infinite .45s; transform-origin: 900px 285px; }
        #floatPhone { animation: float 5s ease-in-out infinite; }
        #scan { animation: scan 3.4s ease-in-out infinite; }
        #orb { animation: drift 7s ease-in-out infinite alternate; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .25; transform: scale(.96); }
        50% { opacity: .75; transform: scale(1.04); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes scan {
        0% { transform: translateY(-250px); opacity: 0; }
        18%, 82% { opacity: .8; }
        100% { transform: translateY(260px); opacity: 0; }
      }
      @keyframes drift {
        from { transform: translate(0, 0); }
        to { transform: translate(34px, -18px); }
      }
    </style>
  </defs>

  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="560" rx="34" fill="url(#glowA)"/>
  <rect width="1200" height="560" rx="34" fill="url(#glowB)"/>

  <g opacity="0.8">
    <path class="grid" d="M0 442H1200M0 491H1200M0 540H1200M91 0V560M179 0V560M267 0V560M355 0V560M443 0V560M531 0V560M619 0V560M707 0V560M795 0V560M883 0V560M971 0V560M1059 0V560M1147 0V560"/>
    <path d="M120 448C256 382 370 355 520 358C687 361 801 430 1080 406" stroke="#22d3ee" stroke-opacity=".18"/>
  </g>

  <g id="orb" opacity=".85">
    <circle cx="1000" cy="111" r="68" fill="#22d3ee" fill-opacity=".08"/>
    <circle cx="1000" cy="111" r="34" fill="#22d3ee" fill-opacity=".16"/>
  </g>

  <g transform="translate(72 72)">
    <rect x="0" y="0" width="568" height="416" rx="32" fill="#0b1120" fill-opacity=".72" stroke="#334155"/>
    <rect x="24" y="24" width="520" height="368" rx="24" fill="#020617" fill-opacity=".45" stroke="#1e293b"/>
    <text x="52" y="78" class="mono" font-size="18" font-weight="700" fill="#22d3ee">ABY DANIEL VARGHESE</text>
    <text x="52" y="142" class="sans" font-size="54" font-weight="850" fill="#f8fafc">Building apps</text>
    <text x="52" y="200" class="sans" font-size="54" font-weight="850" fill="#f8fafc">people remember.</text>
    <text x="54" y="250" class="sans" font-size="22" font-weight="600" fill="#cbd5e1">MSc IT with Web Development</text>
    <text x="54" y="288" class="sans" font-size="18" fill="#94a3b8">Python, Django, React Native, TypeScript, APIs, AI tools</text>
    <rect x="52" y="326" width="132" height="42" rx="21" fill="#22d3ee" fill-opacity=".16" stroke="#22d3ee"/>
    <text x="76" y="353" class="mono" font-size="14" font-weight="700" fill="#67e8f9">MEMOLENS</text>
    <rect x="198" y="326" width="166" height="42" rx="21" fill="#a78bfa" fill-opacity=".12" stroke="#8b5cf6" stroke-opacity=".8"/>
    <text x="224" y="353" class="mono" font-size="14" font-weight="700" fill="#c4b5fd">LOCAL FIRST</text>
    <rect x="378" y="326" width="118" height="42" rx="21" fill="#14b8a6" fill-opacity=".12" stroke="#2dd4bf" stroke-opacity=".7"/>
    <text x="407" y="353" class="mono" font-size="14" font-weight="700" fill="#5eead4">EXPO</text>
  </g>

  <g id="floatPhone" filter="url(#softShadow)">
    <rect x="744" y="76" width="300" height="438" rx="56" fill="#0f172a" stroke="url(#cyan)" stroke-width="2"/>
    <rect x="772" y="98" width="242" height="392" rx="42" fill="url(#phone)" stroke="#334155"/>
    <g clip-path="url(#phoneClip)">
      <rect x="772" y="98" width="242" height="392" fill="#020617"/>
      <circle cx="902" cy="274" r="170" fill="#22d3ee" fill-opacity=".08"/>
      <rect x="796" y="132" width="194" height="58" rx="20" fill="#111827" stroke="#1f2937"/>
      <circle cx="824" cy="161" r="16" fill="#22d3ee" fill-opacity=".22"/>
      <text x="850" y="156" class="sans" font-size="15" font-weight="800" fill="#f8fafc">MemoLens</text>
      <text x="850" y="176" class="mono" font-size="10" fill="#94a3b8">private memory gallery</text>
      <rect x="796" y="216" width="88" height="104" rx="18" fill="#1e293b"/>
      <rect x="902" y="216" width="88" height="104" rx="18" fill="#12202f"/>
      <rect x="796" y="338" width="88" height="104" rx="18" fill="#172033"/>
      <rect x="902" y="338" width="88" height="104" rx="18" fill="#0f2431"/>
      <path d="M810 291L842 252L866 281L884 260V320H810V291Z" fill="#22d3ee" fill-opacity=".46"/>
      <path d="M916 290L944 253L974 303V320H916V290Z" fill="#a78bfa" fill-opacity=".42"/>
      <path d="M810 414L846 374L884 430V442H810V414Z" fill="#14b8a6" fill-opacity=".38"/>
      <path d="M916 422L958 370L990 424V442H916V422Z" fill="#38bdf8" fill-opacity=".35"/>
      <g id="scan">
        <rect x="772" y="98" width="242" height="50" fill="#22d3ee" fill-opacity=".12"/>
        <rect x="772" y="144" width="242" height="2" fill="#67e8f9" fill-opacity=".75"/>
      </g>
    </g>
    <rect x="846" y="111" width="64" height="6" rx="3" fill="#334155"/>
  </g>

  <g id="ringA" filter="url(#cyanGlow)">
    <circle cx="900" cy="285" r="104" stroke="#22d3ee" stroke-opacity=".38" stroke-width="2"/>
  </g>
  <g id="ringB">
    <circle cx="900" cy="285" r="142" stroke="#a78bfa" stroke-opacity=".24" stroke-width="2" stroke-dasharray="8 12"/>
  </g>

  <g transform="translate(658 374)">
    <rect x="0" y="0" width="206" height="76" rx="22" fill="#020617" fill-opacity=".76" stroke="#334155"/>
    <text x="22" y="31" class="mono" font-size="12" font-weight="700" fill="#22d3ee">CURRENT FLAGSHIP</text>
    <text x="22" y="56" class="sans" font-size="22" font-weight="850" fill="#f8fafc">MemoLens</text>
  </g>

  <g transform="translate(910 382)">
    <rect x="0" y="0" width="196" height="68" rx="20" fill="#020617" fill-opacity=".72" stroke="#334155"/>
    <text x="18" y="28" class="mono" font-size="12" font-weight="700" fill="#94a3b8">REACT NATIVE</text>
    <text x="18" y="51" class="mono" font-size="12" font-weight="700" fill="#22d3ee">EXPO + TYPESCRIPT</text>
  </g>

  <path d="M0 526C190 480 334 471 516 489C762 514 939 509 1200 448V560H0V526Z" fill="#020617" fill-opacity=".55"/>
</svg>