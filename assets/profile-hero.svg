    <rect x="96" y="106" width="564" height="436" rx="28" fill="#020617" fill-opacity=".68" stroke="#1e293b"/>

    <text x="132" y="162" class="mono" font-size="15" font-weight="800" fill="#22d3ee">CURRENT MAIN QUEST</text>
    <g>
      <text x="130" y="238" class="display" font-size="70" font-weight="900" fill="#f8fafc">MEMOLENS</text>
      <rect id="titleSheen" x="112" y="176" width="120" height="75" fill="#22d3ee" fill-opacity=".18" transform="skewX(-18)"/>
    </g>
    <text x="132" y="288" class="sans" font-size="28" font-weight="800" fill="#f8fafc">Aby Daniel Varghese</text>
    <text x="132" y="324" class="sans" font-size="21" font-weight="650" fill="#cbd5e1">MSc IT with Web Development - UWS Paisley</text>
    <text x="132" y="370" class="sans" font-size="18" fill="#94a3b8">Full-stack builder turning rough ideas into mobile apps, APIs,</text>
    <text x="132" y="397" class="sans" font-size="18" fill="#94a3b8">data workflows and AI-assisted product experiences.</text>

    <g transform="translate(132 438)">
      <rect width="146" height="44" rx="22" fill="#22d3ee" fill-opacity=".14" stroke="#22d3ee"/>
      <text x="25" y="28" class="mono" font-size="13" font-weight="850" fill="#67e8f9">REACT NATIVE</text>
      <rect x="160" width="96" height="44" rx="22" fill="#fb7185" fill-opacity=".12" stroke="#fb7185"/>
      <text x="191" y="28" class="mono" font-size="13" font-weight="850" fill="#fda4af">EXPO</text>
      <rect x="270" width="134" height="44" rx="22" fill="#facc15" fill-opacity=".1" stroke="#facc15" stroke-opacity=".78"/>
      <text x="292" y="28" class="mono" font-size="13" font-weight="850" fill="#fde68a">TYPESCRIPT</text>
      <rect x="418" width="106" height="44" rx="22" fill="#14b8a6" fill-opacity=".12" stroke="#14b8a6"/>
      <text x="450" y="28" class="mono" font-size="13" font-weight="850" fill="#5eead4">PYTHON</text>
    </g>
  </g>

