<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aby Daniel Varghese anime cyber MemoLens profile hero</title>
  <desc id="desc">A cinematic anime inspired GitHub profile banner for Aby Daniel Varghese, highlighting MemoLens, full-stack development and mobile product building.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#02030a"/>
      <stop offset="0.42" stop-color="#081120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="horizon" x1="83" y1="528" x2="1115" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset=".22" stop-color="#22d3ee"/>
      <stop offset=".55" stop-color="#fb7185"/>
      <stop offset=".82" stop-color="#facc15"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="slashInk" x1="861" y1="107" x2="1057" y2="533" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset=".48" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="slashDark" x1="1009" y1="140" x2="1117" y2="547" gradientUnits="userSpaceOnUse">
      <stop stop-color="#192132"/>
      <stop offset=".55" stop-color="#050912"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cardEdge" x1="77" y1="71" x2="720" y2="588" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset=".34" stop-color="#67e8f9"/>
      <stop offset=".68" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(873 263) rotate(90) scale(342 370)">
      <stop stop-color="#22d3ee" stop-opacity=".42"/>
      <stop offset=".56" stop-color="#22d3ee" stop-opacity=".08"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="roseGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1037 390) rotate(90) scale(300 270)">
      <stop stop-color="#fb7185" stop-opacity=".35"/>
      <stop offset=".58" stop-color="#fb7185" stop-opacity=".07"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="24" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#22d3ee" flood-opacity=".78"/>
    </filter>
    <filter id="roseNeon" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#fb7185" flood-opacity=".72"/>
    </filter>
    <clipPath id="portraitClip">
      <path d="M839 131L1072 131L982 548L742 548L839 131Z"/>
    </clipPath>
    <clipPath id="phoneClip">
      <rect x="621" y="286" width="136" height="238" rx="28"/>
    </clipPath>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .display { font-family: Orbitron, Rajdhani, Eurostile, "Arial Black", Impact, sans-serif; }
      @media (prefers-reduced-motion: no-preference) {
        #slashOne { animation: slashOne 4.8s ease-in-out infinite; }
        #slashTwo { animation: slashTwo 5.8s ease-in-out infinite; }
        #slashThree { animation: slashThree 6.4s ease-in-out infinite; }
        #phone { animation: floatPhone 5.4s ease-in-out infinite; }
        #leftPanel { animation: panelFloat 6.5s ease-in-out infinite; }
        #memoryA { animation: memoryFloat 5.6s ease-in-out infinite; }
        #memoryB { animation: memoryFloat 6.1s ease-in-out infinite .7s; }
        #memoryC { animation: memoryFloat 5.2s ease-in-out infinite 1.1s; }
        #scanLine { animation: scan 3.2s ease-in-out infinite; }
        #titleSheen { animation: sheen 4.5s ease-in-out infinite; }
        #starsA { animation: stars 7s ease-in-out infinite alternate; }
      }
      @keyframes slashOne {
        0%, 100% { transform: translateX(0); opacity: .94; }
        50% { transform: translateX(-28px); opacity: .72; }
      }
      @keyframes slashTwo {
        0%, 100% { transform: translateX(0); opacity: .88; }
        50% { transform: translateX(32px); opacity: 1; }
      }
      @keyframes slashThree {
        0%, 100% { transform: translateX(0); opacity: .38; }
        50% { transform: translateX(42px); opacity: .74; }
      }
      @keyframes floatPhone {
        0%, 100% { transform: translateY(0) rotate(-6deg); }
        50% { transform: translateY(-13px) rotate(-4deg); }
      }
      @keyframes panelFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes memoryFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      @keyframes scan {
        0% { transform: translateY(-220px); opacity: 0; }
        18%, 78% { opacity: .9; }
        100% { transform: translateY(245px); opacity: 0; }
      }
      @keyframes sheen {
        0%, 100% { transform: translateX(-250px); opacity: 0; }
        38%, 55% { opacity: .7; }
        82% { transform: translateX(450px); opacity: 0; }
      }
      @keyframes stars {
        from { transform: translateY(0); opacity: .68; }
        to { transform: translateY(-12px); opacity: 1; }
      }
    </style>
  </defs>

