<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aby Daniel anime developer console</title>
  <desc id="desc">An animated cyber console summarising Aby Daniel Varghese's current build focus, technologies and profile signal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#02030a"/>
      <stop offset=".48" stop-color="#07111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="70" y1="45" x2="1110" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset=".38" stop-color="#fb7185"/>
      <stop offset=".72" stop-color="#facc15"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(236 188) rotate(90) scale(210 320)">
      <stop stop-color="#22d3ee" stop-opacity=".32"/>
      <stop offset=".58" stop-color="#22d3ee" stop-opacity=".08"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(916 226) rotate(90) scale(260 340)">
      <stop stop-color="#fb7185" stop-opacity=".26"/>
      <stop offset=".6" stop-color="#fb7185" stop-opacity=".07"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity=".38"/>
    </filter>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22d3ee" flood-opacity=".65"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .display { font-family: Orbitron, Rajdhani, Eurostile, "Arial Black", Impact, sans-serif; }
      @media (prefers-reduced-motion: no-preference) {
        #scan { animation: scan 4.2s ease-in-out infinite; }
        #cursor { animation: blink 1s steps(2, start) infinite; }
        #cardA { animation: floatA 5.8s ease-in-out infinite; }
        #cardB { animation: floatB 6.4s ease-in-out infinite; }
        #cardC { animation: floatA 5.4s ease-in-out infinite .8s; }
        #wave { animation: dash 5s linear infinite; }
        #avatarRing { animation: pulse 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      }
      @keyframes scan {
        0% { transform: translateY(-220px); opacity: 0; }
        18%, 78% { opacity: .85; }
        100% { transform: translateY(230px); opacity: 0; }
      }
      @keyframes blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }
      @keyframes floatA {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-9px); }
      }
      @keyframes floatB {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(10px); }
      }
      @keyframes dash {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -120; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .42; transform: scale(.96); }
        50% { opacity: 1; transform: scale(1.04); }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="32" fill="url(#glowA)"/>
  <rect width="1200" height="420" rx="32" fill="url(#glowB)"/>
  <rect x="42" y="42" width="1116" height="336" rx="28" fill="#020617" fill-opacity=".54" stroke="url(#edge)" stroke-width="2"/>

  <g opacity=".72">
    <path d="M88 105H1112M88 323H1112M171 70V352M293 70V352M415 70V352M537 70V352M659 70V352M781 70V352M903 70V352M1025 70V352" stroke="#38bdf8" stroke-opacity=".08"/>
    <path id="wave" d="M82 318C216 259 354 248 502 274C666 303 812 350 1118 249" stroke="#22d3ee" stroke-opacity=".22" stroke-width="2" stroke-dasharray="18 14"/>
  </g>

  <g transform="translate(82 78)">
    <text class="mono" x="0" y="0" font-size="14" font-weight="850" fill="#22d3ee">ABY_OS / BUILD CONSOLE</text>
    <text class="display" x="0" y="62" font-size="46" font-weight="900" fill="#f8fafc">Currently shipping</text>
    <text class="sans" x="2" y="104" font-size="19" font-weight="650" fill="#cbd5e1">MemoLens, full-stack APIs and AI-assisted product workflows.</text>
  </g>

  <g transform="translate(82 222)" filter="url(#shadow)">
    <rect width="515" height="106" rx="24" fill="#050914" stroke="#1e293b"/>
    <rect x="24" y="23" width="11" height="11" rx="5.5" fill="#fb7185"/>
    <rect x="43" y="23" width="11" height="11" rx="5.5" fill="#facc15"/>
    <rect x="62" y="23" width="11" height="11" rx="5.5" fill="#14b8a6"/>
    <text x="24" y="62" class="mono" font-size="15" font-weight="850" fill="#22d3ee">$ run profile --focus memolens</text>
    <rect id="cursor" x="354" y="48" width="10" height="20" fill="#67e8f9"/>
    <text x="24" y="87" class="mono" font-size="13" fill="#94a3b8">status: polishing real projects into product proof</text>
  </g>

  <g id="cardA" filter="url(#shadow)">
    <rect x="636" y="86" width="170" height="88" rx="22" fill="#07111f" stroke="#22d3ee" stroke-opacity=".82"/>
    <text x="661" y="122" class="mono" font-size="12" font-weight="850" fill="#67e8f9">MOBILE CORE</text>
    <text x="661" y="151" class="sans" font-size="22" font-weight="850" fill="#f8fafc">React Native</text>
  </g>

  <g id="cardB" filter="url(#shadow)">
    <rect x="646" y="221" width="190" height="92" rx="22" fill="#07111f" stroke="#fb7185" stroke-opacity=".78"/>
    <text x="671" y="258" class="mono" font-size="12" font-weight="850" fill="#fda4af">BACKEND FLOW</text>
    <text x="671" y="287" class="sans" font-size="22" font-weight="850" fill="#f8fafc">Python APIs</text>
  </g>

  <g id="cardC" filter="url(#shadow)">
    <rect x="844" y="270" width="190" height="88" rx="22" fill="#07111f" stroke="#facc15" stroke-opacity=".8"/>
    <text x="869" y="306" class="mono" font-size="12" font-weight="850" fill="#fde68a">AI LAYER</text>
    <text x="869" y="335" class="sans" font-size="22" font-weight="850" fill="#f8fafc">RAG tools</text>
  </g>

  <g transform="translate(855 78)" filter="url(#shadow)">
    <rect x="0" y="0" width="226" height="184" rx="28" fill="#050914" fill-opacity=".82" stroke="#334155"/>
    <circle cx="114" cy="78" r="62" fill="#020617" stroke="#334155"/>
    <circle id="avatarRing" cx="114" cy="78" r="75" stroke="#22d3ee" stroke-width="2" stroke-dasharray="10 16"/>
    <path d="M50 168C61 131 86 115 114 115C144 115 170 131 181 168H50Z" fill="#111827"/>
    <path d="M72 166L96 125H132L156 166H72Z" fill="#172033"/>
    <path d="M95 127L114 151L134 127" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
    <path d="M63 81C64 42 91 20 125 22C161 25 184 53 179 91C164 67 143 55 116 56C91 57 75 65 63 81Z" fill="#020617"/>
    <path d="M73 46C93 18 136 12 167 39C140 31 109 34 83 58Z" fill="#334155"/>
    <path d="M55 84C64 56 90 38 120 38C154 38 176 59 176 91C176 123 151 146 119 148C84 150 57 119 55 84Z" fill="#d1d5db"/>
    <path d="M78 105C85 136 102 157 121 157C141 157 160 137 166 105C157 143 136 164 112 162C92 160 79 138 78 105Z" fill="#0f172a"/>
    <path d="M77 86C92 78 111 79 123 90C105 87 92 88 77 96V86Z" fill="#020617"/>
    <path d="M132 90C147 78 165 79 179 92C160 88 147 90 132 100V90Z" fill="#020617"/>
    <ellipse cx="102" cy="107" rx="13" ry="8" fill="#f8fafc"/>
    <ellipse cx="154" cy="109" rx="13" ry="8" fill="#f8fafc"/>
    <circle cx="102" cy="107" r="5" fill="#22d3ee"/>
    <circle cx="154" cy="109" r="5" fill="#fb7185"/>
    <path d="M127 112C121 126 123 134 134 139" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <path d="M101 137C115 147 138 147 152 136C140 154 113 154 101 137Z" fill="#020617"/>
  </g>

  <g id="scan">
    <rect x="42" y="42" width="1116" height="46" fill="#22d3ee" fill-opacity=".09"/>
    <rect x="42" y="86" width="1116" height="2" fill="#67e8f9" fill-opacity=".7"/>
  </g>

  <g transform="translate(910 73)">
    <rect width="210" height="38" rx="19" fill="#020617" fill-opacity=".76" stroke="#334155"/>
    <circle cx="24" cy="19" r="7" fill="#14b8a6"/>
    <text x="45" y="24" class="mono" font-size="11" font-weight="850" fill="#cbd5e1">OPEN TO SOFTWARE ROLES</text>
  </g>
</svg>
