<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aby Daniel project system</title>
  <desc id="desc">A dark glass project board showing MemoLens, Product Explorer, RAG News Chatbot and KPA Backend API.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="105" y1="56" x2="1100" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset=".55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(615 214) rotate(90) scale(270 520)">
      <stop stop-color="#22d3ee" stop-opacity=".26"/>
      <stop offset=".55" stop-color="#22d3ee" stop-opacity=".07"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, &quot;Liberation Mono&quot;, monospace; }
      @media (prefers-reduced-motion: no-preference) {
        #beam { animation: beam 4s ease-in-out infinite; }
        #nodeA { animation: lift 5s ease-in-out infinite; }
        #nodeB { animation: lift 5s ease-in-out infinite .6s; }
        #nodeC { animation: lift 5s ease-in-out infinite 1.1s; }
        #nodeD { animation: lift 5s ease-in-out infinite 1.6s; }
      }
      @keyframes beam {
        0%, 100% { opacity: .25; transform: translateX(-22px); }
        50% { opacity: .85; transform: translateX(24px); }
      }
      @keyframes lift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>
  </defs>

  <rect width="1200" height="430" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="30" fill="url(#glow)"/>
  <path d="M64 338C230 274 348 266 524 288C729 314 890 322 1136 245" stroke="#22d3ee" stroke-opacity=".15"/>
  <path d="M110 92H1090M110 338H1090M174 40V390M316 40V390M458 40V390M600 40V390M742 40V390M884 40V390M1026 40V390" stroke="#38bdf8" stroke-opacity=".1"/>

  <text x="74" y="75" class="mono" font-size="16" font-weight="800" fill="#22d3ee">PROJECT SYSTEM</text>
  <text x="74" y="122" class="sans" font-size="42" font-weight="850" fill="#f8fafc">Recent builds with product weight</text>
  <text x="76" y="154" class="sans" font-size="18" fill="#94a3b8">Mobile app, product data platform, RAG assistant and production-style backend APIs.</text>

  <g id="beam">
    <path d="M196 244H1010" stroke="url(#edge)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 16"/>
    <circle cx="603" cy="244" r="7" fill="#22d3ee"/>
  </g>

  <g id="nodeA" filter="url(#shadow)">
    <rect x="92" y="203" width="244" height="142" rx="24" fill="#08111f" stroke="#22d3ee" stroke-opacity=".7"/>
    <circle cx="126" cy="237" r="16" fill="#22d3ee" fill-opacity=".18"/>
    <text x="154" y="235" class="sans" font-size="24" font-weight="850" fill="#f8fafc">MemoLens</text>
    <text x="154" y="258" class="mono" font-size="11" fill="#22d3ee">FLAGSHIP MOBILE APP</text>
    <text x="118" y="297" class="sans" font-size="14" fill="#cbd5e1">Private local-first gallery</text>
    <text x="118" y="321" class="mono" font-size="12" fill="#94a3b8">Expo  React Native  TS</text>
  </g>

  <g id="nodeB" filter="url(#shadow)">
    <rect x="360" y="188" width="244" height="142" rx="24" fill="#08111f" stroke="#8b5cf6" stroke-opacity=".65"/>
    <circle cx="394" cy="222" r="16" fill="#8b5cf6" fill-opacity=".18"/>
    <text x="422" y="220" class="sans" font-size="23" font-weight="850" fill="#f8fafc">Product Explorer</text>
    <text x="422" y="243" class="mono" font-size="11" fill="#c4b5fd">FULL STACK DATA APP</text>
    <text x="386" y="282" class="sans" font-size="14" fill="#cbd5e1">Scrape, normalise, browse</text>
    <text x="386" y="306" class="mono" font-size="12" fill="#94a3b8">Next  Nest  Postgres</text>
  </g>

  <g id="nodeC" filter="url(#shadow)">
    <rect x="628" y="203" width="244" height="142" rx="24" fill="#08111f" stroke="#38bdf8" stroke-opacity=".62"/>
    <circle cx="662" cy="237" r="16" fill="#38bdf8" fill-opacity=".18"/>
    <text x="690" y="235" class="sans" font-size="24" font-weight="850" fill="#f8fafc">RAG News</text>
    <text x="690" y="258" class="mono" font-size="11" fill="#67e8f9">AI RETRIEVAL ASSISTANT</text>
    <text x="654" y="297" class="sans" font-size="14" fill="#cbd5e1">Grounded answers + citations</text>
    <text x="654" y="321" class="mono" font-size="12" fill="#94a3b8">React  Qdrant  Gemini</text>
  </g>

  <g id="nodeD" filter="url(#shadow)">
    <rect x="896" y="188" width="244" height="142" rx="24" fill="#08111f" stroke="#14b8a6" stroke-opacity=".62"/>
    <circle cx="930" cy="222" r="16" fill="#14b8a6" fill-opacity=".18"/>
    <text x="958" y="220" class="sans" font-size="24" font-weight="850" fill="#f8fafc">KPA API</text>
    <text x="958" y="243" class="mono" font-size="11" fill="#5eead4">BACKEND SYSTEM</text>
    <text x="922" y="282" class="sans" font-size="14" fill="#cbd5e1">Structured submissions</text>
    <text x="922" y="306" class="mono" font-size="12" fill="#94a3b8">FastAPI  SQLAlchemy</text>
  </g>
</svg>